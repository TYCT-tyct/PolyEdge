name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cargo Tests
        run: cargo test --workspace --all-targets --quiet

      - name: Frontend Build
        run: |
          npm --prefix heatmap_dashboard ci
          npm --prefix heatmap_dashboard run build
